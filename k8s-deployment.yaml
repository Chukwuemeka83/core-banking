# Kubernetes Deployment Manifests for FinAegis Go
# Path: deployments/kubernetes/base/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: finaegis
  labels:
    name: finaegis
    environment: production

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: finaegis-config
  namespace: finaegis
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka-service:9092"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  OTEL_ENDPOINT: "http://jaeger-collector:4318"

---
# Secret (base64 encoded values)
apiVersion: v1
kind: Secret
metadata:
  name: finaegis-secrets
  namespace: finaegis
type: Opaque
data:
  DATABASE_PASSWORD: cG9zdGdyZXM=  # 'postgres' - CHANGE IN PRODUCTION
  LEDGER_API_KEY: ""
  PAYMENT_API_KEY: ""
  COMPLIANCE_API_KEY: ""
  JWT_SECRET: ""

---
# API Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finaegis-api
  namespace: finaegis
  labels:
    app: finaegis-api
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: finaegis-api
  template:
    metadata:
      labels:
        app: finaegis-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: finaegis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Init container for migrations
      initContainers:
      - name: migrate
        image: ghcr.io/finaegis/migrator:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: finaegis-config
        - secretRef:
            name: finaegis-secrets
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/finaegis?sslmode=require"

      containers:
      - name: api
        image: ghcr.io/finaegis/api-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9091
          protocol: TCP

        envFrom:
        - configMapRef:
            name: finaegis-config
        - secretRef:
            name: finaegis-secrets

        env:
        - name: DATABASE_URL
          value: "postgres://postgres:$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/finaegis?sslmode=require"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

      terminationGracePeriodSeconds: 30

---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finaegis-worker
  namespace: finaegis
  labels:
    app: finaegis-worker
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finaegis-worker
  template:
    metadata:
      labels:
        app: finaegis-worker
        tier: backend
    spec:
      serviceAccountName: finaegis-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: worker
        image: ghcr.io/finaegis/worker:latest
        imagePullPolicy: IfNotPresent

        envFrom:
        - configMapRef:
            name: finaegis-config
        - secretRef:
            name: finaegis-secrets

        env:
        - name: WORKER_QUEUES
          value: "events,ledger,transactions,transfers,webhooks"

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: finaegis-api-service
  namespace: finaegis
  labels:
    app: finaegis-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
  selector:
    app: finaegis-api

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finaegis-ingress
  namespace: finaegis
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.finaegis.com
    secretName: finaegis-tls
  rules:
  - host: api.finaegis.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finaegis-api-service
            port:
              number: 8080

---
# HorizontalPodAutoscaler for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finaegis-api-hpa
  namespace: finaegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finaegis-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
# ServiceAccount for API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finaegis-api
  namespace: finaegis

---
# ServiceAccount for Worker
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finaegis-worker
  namespace: finaegis

---
# PodDisruptionBudget for API
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: finaegis-api-pdb
  namespace: finaegis
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: finaegis-api

---
# NetworkPolicy - API can talk to Postgres, Redis, Kafka
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finaegis-api-network-policy
  namespace: finaegis
spec:
  podSelector:
    matchLabels:
      app: finaegis-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: finaegis
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: finaegis
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: finaegis-secrets
              key: DATABASE_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "standard"
      resources:
        requests:
          storage: 50Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: finaegis
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: finaegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: finaegis
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
